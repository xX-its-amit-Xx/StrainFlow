# MultiQC configuration for StrainFlow
title: "StrainFlow Metagenomics Pipeline"
subtitle: "Strain-resolved shotgun metagenomics QC report"
intro_text: "Generated by <a href='https://github.com/xX-its-amit-Xx/StrainFlow'>StrainFlow</a>"
report_comment: "This report aggregates QC metrics from fastp, FastQC, Kraken2, Bracken, and CheckM."

# Module order in report
module_order:
  - fastqc:
      name: "FastQC (pre-trim)"
      path_filters:
        - "*_R1_001_fastqc.zip"
        - "*_R2_001_fastqc.zip"
  - fastp
  - fastqc:
      name: "FastQC (post-trim)"
      path_filters:
        - "*_trimmed_fastqc.zip"
  - kraken2
  - checkm

# Appearance
table_columns_visible:
  fastp:
    pct_duplication: true
    after_filtering_q30_rate: true
    filtering_result_passed_filter_reads: true
  fastqc:
    percent_gc: true
    avg_sequence_length: true
    percent_fails: true

# Remove samples matching these patterns from plots
sample_names_ignore:
  - "Undetermined*"
